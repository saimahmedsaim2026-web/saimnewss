<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaimNews | SuperAdmin Neural Interface</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;600;700&family=Orbitron:wght@400;900&family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --primary: #ff0000;
            --dark-bg: #050506;
            --card-bg: rgba(255, 255, 255, 0.03);
            --neon: 0 0 15px var(--primary);
            --text: #e0e0e0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; transition: 0.3s ease; }
        
        body { 
            background: var(--dark-bg); 
            color: var(--text); 
            font-family: 'Inter', 'Hind Siliguri', sans-serif;
            display: none; /* Security check */
        }

        /* Dashboard Layout */
        .admin-wrapper { display: grid; grid-template-columns: 280px 1fr; min-height: 100vh; }

        /* Sidebar Navigation */
        .sidebar {
            background: rgba(255,255,255,0.02);
            border-right: 1px solid rgba(255,255,255,0.05);
            padding: 30px;
            backdrop-filter: blur(20px);
        }
        .side-logo { font-family: 'Orbitron'; font-size: 1.5rem; margin-bottom: 50px; }
        .side-logo span { color: var(--primary); }
        
        .nav-link {
            padding: 15px; display: flex; align-items: center; gap: 15px;
            color: #888; text-decoration: none; border-radius: 12px; margin-bottom: 10px;
            cursor: pointer;
        }
        .nav-link.active, .nav-link:hover { background: var(--card-bg); color: white; border-left: 3px solid var(--primary); }

        /* Main Content */
        .content-area { padding: 40px; overflow-y: auto; max-height: 100vh; }

        /* Stats Bar */
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 40px; }
        .stat-card { background: var(--card-bg); padding: 25px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); }
        .stat-card h3 { font-family: 'Orbitron'; font-size: 2rem; color: var(--primary); text-shadow: var(--neon); }

        /* Form Styling */
        .form-container { 
            background: var(--card-bg); padding: 40px; border-radius: 30px; 
            border: 1px solid rgba(255,255,255,0.05); margin-bottom: 40px;
        }
        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 10px; font-size: 0.9rem; color: #888; }
        input, select, textarea {
            width: 100%; background: #000; border: 1px solid #333; padding: 15px;
            border-radius: 12px; color: white; outline: none; font-size: 1rem;
        }
        input:focus { border-color: var(--primary); box-shadow: var(--neon); }

        .btn-action {
            width: 100%; padding: 18px; border: none; border-radius: 12px;
            font-weight: 900; font-family: 'Orbitron'; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-publish { background: var(--primary); color: white; box-shadow: var(--neon); }
        .btn-update { background: #00f2ff; color: #000; display: none; }

        /* News List Management */
        .news-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .news-row { background: rgba(255,255,255,0.01); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .news-row:hover { background: rgba(255,255,255,0.03); }
        .news-row td { padding: 20px; }
        .row-img { width: 60px; height: 40px; border-radius: 6px; object-fit: cover; }
        
        .badge { padding: 4px 10px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; }
        .badge-cat { background: rgba(0,242,255,0.1); color: #00f2ff; }

        .action-icon { width: 35px; height: 35px; border-radius: 8px; cursor: pointer; margin-right: 5px; border: none; }
        .edit-ic { background: #0044ff; color: white; }
        .del-ic { background: #ff0000; color: white; }

        #toast {
            position: fixed; bottom: 30px; right: 30px; background: var(--primary);
            padding: 15px 30px; border-radius: 10px; display: none; z-index: 10000;
            box-shadow: var(--neon); font-weight: bold;
        }

        @media (max-width: 900px) {
            .admin-wrapper { grid-template-columns: 1fr; }
            .sidebar { display: none; }
        }
    </style>
</head>
<body>

<div id="toast">সাফল্যের সাথে সম্পন্ন হয়েছে!</div>

<div class="admin-wrapper">
    <aside class="sidebar">
        <div class="side-logo">SAIM<span>ADMIN</span></div>
        <div class="nav-link active"><i class="fas fa-plus-square"></i> কন্ট্রোল প্যানেল</div>
        <div class="nav-link" onclick="logout()"><i class="fas fa-power-off"></i> লগ আউট</div>
        
        <div style="margin-top: 50px; padding: 20px; background: rgba(255,0,0,0.05); border-radius: 15px; font-size: 0.8rem;">
            <p style="color:var(--primary); font-weight: 700;">Admin Info:</p>
            <p id="adminEmailDisplay" style="opacity: 0.6;"></p>
        </div>
    </aside>

    <main class="content-area">
        <div class="stats-grid">
            <div class="stat-card">
                <p>মোট সংবাদ</p>
                <h3 id="statTotal">00</h3>
            </div>
            <div class="stat-card">
                <p>আজকের নিউজ</p>
                <h3 id="statToday" style="color:#00f2ff; text-shadow:0 0 10px #00f2ff;">00</h3>
            </div>
            <div class="stat-card">
                <p>সার্ভার স্ট্যাটাস</p>
                <h3 style="color:#00ff40; text-shadow:0 0 10px #00ff40;">Online</h3>
            </div>
        </div>

        <div class="form-container">
            <h2 id="formTitle" style="font-family:'Orbitron'; margin-bottom:30px; border-left: 5px solid var(--primary); padding-left: 15px;">PUBLISH NEWS</h2>
            <input type="hidden" id="editDocId">
            
            <div class="input-group">
                <label>সংবাদের শিরোনাম</label>
                <input type="text" id="pTitle" placeholder="এখানে হেডলাইন লিখুন...">
            </div>

            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px;">
                <div class="input-group">
                    <label>ক্যাটাগরি</label>
                    <select id="pCat">
                        <option value="বাংলাদেশ">বাংলাদেশ</option>
                        <option value="আন্তর্জাতিক">আন্তর্জাতিক</option>
                        <option value="প্রযুক্তি">প্রযুক্তি</option>
                        <option value="খেলা">খেলা</option>
                        <option value="রাজনীতি">রাজনীতি</option>
                        <option value="বিনোদন">বিনোদন</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>ইমেজ ইউআরএল</label>
                    <input type="text" id="pImg" placeholder="https://image-link.com/photo.jpg">
                </div>
            </div>

            <div class="input-group">
                <label>ইউটিউব ভিডিও আইডি (ঐচ্ছিক)</label>
                <input type="text" id="pVid" placeholder="যেমন: r7qovpFAGrQ">
            </div>

            <div class="input-group">
                <label>বিস্তারিত সংবাদ বিবরণ</label>
                <textarea id="pDesc" rows="8" placeholder="সম্পূর্ণ সংবাদটি এখানে লিখুন..."></textarea>
            </div>

            <button class="btn-action btn-publish" id="publishBtn" onclick="publishNews()">
                <i class="fas fa-satellite-dish"></i> সিস্টেম ব্রডকাস্ট করুন
            </button>
            
            <button class="btn-action btn-update" id="updateBtn" onclick="updateNews()">
                <i class="fas fa-sync-alt"></i> ডেটা আপডেট করুন
            </button>
            <p id="resetLink" onclick="resetForm()" style="text-align:center; margin-top:15px; cursor:pointer; font-size:0.8rem; opacity:0.5; display:none;">নতুন নিউজে ফিরে যান</p>
        </div>

        <div class="form-container" style="padding: 20px;">
            <h2 style="font-family:'Orbitron'; font-size: 1.2rem; margin-bottom: 20px;">NEWS DATABASE</h2>
            <div style="overflow-x: auto;">
                <table class="news-table">
                    <thead>
                        <tr style="text-align:left; color:#666; font-size:0.8rem; text-transform:uppercase;">
                            <th>ইমেজ</th>
                            <th>শিরোনাম</th>
                            <th>ক্যাটাগরি</th>
                            <th>তারিখ</th>
                            <th>অ্যাকশন</th>
                        </tr>
                    </thead>
                    <tbody id="adminNewsList">
                        </tbody>
                </table>
            </div>
        </div>
    </main>
</div>

<script>
    // --- (b) Firebase Config (Must Match index.html) ---
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_PROJECT.firebaseapp.com",
        projectId: "YOUR_PROJECT_ID",
        storageBucket: "YOUR_PROJECT.appspot.com",
        messagingSenderId: "YOUR_ID",
        appId: "YOUR_APP_ID"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // Security & Auth Check
    window.onload = function() {
        if (sessionStorage.getItem("saim_admin") !== "active") {
            window.location.href = "index.html";
        } else {
            document.body.style.display = "block";
            document.getElementById('adminEmailDisplay').innerText = "saimahmedsaim2020@gmail.com";
            loadAdminData();
        }
    };

    function publishNews() {
        const title = document.getElementById('pTitle').value;
        const cat = document.getElementById('pCat').value;
        const desc = document.getElementById('pDesc').value;
        const img = document.getElementById('pImg').value;
        const vid = document.getElementById('pVid').value;

        if(!title || !desc) { showToast("শিরোনাম এবং বিবরণ দিন!"); return; }

        db.collection("saimNews").add({
            title: title,
            category: cat,
            desc: desc,
            image: img || "https://via.placeholder.com/800x450?text=SaimNews",
            videoId: vid || null,
            date: new Date().toLocaleDateString('bn-BD'),
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
        }).then(() => {
            showToast("নিউজ সিস্টেম লাইভ হয়েছে!");
            resetForm();
        });
    }

    function loadAdminData() {
        db.collection("saimNews").orderBy("timestamp", "desc").onSnapshot((snapshot) => {
            const list = document.getElementById('adminNewsList');
            document.getElementById('statTotal').innerText = snapshot.size;
            
            let html = "";
            let todayCount = 0;
            const today = new Date().toLocaleDateString('bn-BD');

            snapshot.forEach((doc) => {
                const n = doc.data();
                if(n.date === today) todayCount++;

                const thumb = n.videoId ? `https://img.youtube.com/vi/${n.videoId}/mqdefault.jpg` : n.image;
                
                html += `
                    <tr class="news-row">
                        <td><img src="${thumb}" class="row-img"></td>
                        <td><div style="width:250px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${n.title}</div></td>
                        <td><span class="badge badge-cat">${n.category}</span></td>
                        <td style="font-size:0.8rem; opacity:0.6;">${n.date}</td>
                        <td>
                            <button class="action-icon edit-ic" onclick="prepareEdit('${doc.id}')"><i class="fas fa-edit"></i></button>
                            <button class="action-icon del-ic" onclick="deleteNews('${doc.id}')"><i class="fas fa-trash-alt"></i></button>
                        </td>
                    </tr>
                `;
            });
            list.innerHTML = html;
            document.getElementById('statToday').innerText = todayCount < 10 ? '0' + todayCount : todayCount;
        });
    }

    function prepareEdit(id) {
        db.collection("saimNews").doc(id).get().then((doc) => {
            const n = doc.data();
            document.getElementById('editDocId').value = id;
            document.getElementById('pTitle').value = n.title;
            document.getElementById('pCat').value = n.category;
            document.getElementById('pDesc').value = n.desc;
            document.getElementById('pImg').value = n.image;
            document.getElementById('pVid').value = n.videoId || "";
            
            document.getElementById('formTitle').innerText = "EDIT NEWS SIGNAL";
            document.getElementById('publishBtn').style.display = "none";
            document.getElementById('updateBtn').style.display = "flex";
            document.getElementById('resetLink').style.display = "block";
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });
    }

    function updateNews() {
        const id = document.getElementById('editDocId').value;
        const updateData = {
            title: document.getElementById('pTitle').value,
            category: document.getElementById('pCat').value,
            desc: document.getElementById('pDesc').value,
            image: document.getElementById('pImg').value,
            videoId: document.getElementById('pVid').value || null
        };

        db.collection("saimNews").doc(id).update(updateData).then(() => {
            showToast("ডেটা সফলভাবে আপডেট হয়েছে!");
            resetForm();
        });
    }

    function deleteNews(id) {
        if(confirm("সিস্টেম থেকে এই ডেটা মুছে ফেলতে চান?")) {
            db.collection("saimNews").doc(id).delete().then(() => {
                showToast("ডেটা মুছে ফেলা হয়েছে।");
            });
        }
    }

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.innerText = msg;
        t.style.display = "block";
        setTimeout(() => { t.style.display = "none"; }, 3000);
    }

    function resetForm() {
        document.getElementById('editDocId').value = "";
        document.getElementById('pTitle').value = "";
        document.getElementById('pDesc').value = "";
        document.getElementById('pImg').value = "";
        document.getElementById('pVid').value = "";
        document.getElementById('formTitle').innerText = "PUBLISH NEWS";
        document.getElementById('publishBtn').style.display = "flex";
        document.getElementById('updateBtn').style.display = "none";
        document.getElementById('resetLink').style.display = "none";
    }

    function logout() {
        sessionStorage.clear();
        window.location.href = "index.html";
    }
</script>

</body>
</html>
