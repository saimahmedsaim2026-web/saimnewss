<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaimNews | AI Driven Future Journalism</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;600;700&family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --primary: #ff0000;
            --dark-core: #050506;
            --glass: rgba(255, 255, 255, 0.05);
            --text: #e0e0e0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }
        
        body { 
            background: var(--dark-core); 
            color: var(--text); 
            font-family: 'Hind Siliguri', sans-serif;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header { 
            background: rgba(5, 5, 6, 0.9); backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass); position: sticky; top: 0; z-index: 1000;
            padding: 15px 40px; display: flex; justify-content: space-between; align-items: center;
        }

        .logo { font-family: 'Orbitron'; font-size: 1.8rem; font-weight: 900; color: white; text-decoration: none; }
        .logo span { color: var(--primary); }

        /* Search Bar Design */
        .header-actions { display: flex; align-items: center; gap: 20px; }
        
        .search-box {
            display: flex;
            align-items: center;
            background: var(--glass);
            padding: 5px 15px;
            border-radius: 50px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .search-box input {
            background: none;
            border: none;
            color: white;
            padding: 5px;
            outline: none;
            width: 120px;
            transition: 0.4s;
        }
        .search-box input:focus { width: 200px; }
        .search-box i { color: #888; }

        .netflix-container { padding: 40px; flex: 1; }
        .row-title { font-family: 'Orbitron'; color: white; border-left: 4px solid var(--primary); padding-left: 15px; margin-bottom: 20px; }
        
        .news-row { 
            display: flex; gap: 20px; overflow-x: auto; padding: 20px 0; 
            scrollbar-width: none;
        }
        .news-row::-webkit-scrollbar { display: none; }

        .netflix-card {
            min-width: 300px; height: 170px; border-radius: 12px; overflow: hidden;
            position: relative; cursor: pointer; transition: 0.4s ease;
            border: 1px solid rgba(255,255,255,0.1); background: #111;
        }
        .netflix-card:hover { transform: scale(1.05); z-index: 10; border-color: var(--primary); box-shadow: 0 0 20px rgba(255,0,0,0.2); }
        .netflix-card img { width: 100%; height: 100%; object-fit: cover; }
        .card-info { position: absolute; inset: 0; background: linear-gradient(transparent, rgba(0,0,0,0.9)); display: flex; flex-direction: column; justify-content: flex-end; padding: 15px; }

        /* Footer Style */
        footer {
            background: #000;
            padding: 40px;
            border-top: 1px solid var(--glass);
            text-align: center;
            margin-top: auto;
        }
        .footer-socials { margin-bottom: 20px; display: flex; justify-content: center; gap: 25px; }
        .footer-socials a { color: white; font-size: 1.5rem; transition: 0.3s; }
        .footer-socials a:hover { color: var(--primary); transform: translateY(-5px); }
        .copyright { font-size: 0.8rem; color: #666; font-family: 'Orbitron'; letter-spacing: 1px; }

        /* Modal Vortex */
        #newsVortex { 
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 9999; 
            overflow-y: auto; padding: 50px 20px; backdrop-filter: blur(10px);
        }
        .vortex-content { max-width: 800px; margin: 0 auto; animation: slideUp 0.4s ease; }
        @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* Admin Trigger - সাধারণ আইকন হিসেবে থাকবে */
        .admin-entry { 
            color: rgba(255,255,255,0.1); 
            font-size: 0.7rem; 
            cursor: pointer; 
            margin-top: 20px;
            transition: 0.3s;
        }
        .admin-entry:hover { color: var(--primary); }

    </style>
</head>
<body>

<header>
    <a href="index.html" class="logo">SAIM<span>NEWS</span></a>
    
    <div class="header-actions">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="খবর খুঁজুন..." onkeyup="searchNews()">
            <i class="fas fa-search"></i>
        </div>
    </div>
</header>

<div class="netflix-container">
    <h2 class="row-title" id="rowTitle">TRENDING NOW</h2>
    <div class="news-row" id="netflix-feed">
        <p style="color: #666;">সিস্টেম লোড হচ্ছে...</p>
    </div>
</div>

<div id="newsVortex">
    <div class="vortex-content">
        <button onclick="closeVortex()" style="background:none; border:none; color:var(--primary); font-size:3rem; float:right; cursor:pointer;">&times;</button>
        <div id="vortex-data"></div>
    </div>
</div>

<footer>
    <div class="footer-socials">
        <a href="https://facebook.com/saimnews" target="_blank"><i class="fab fa-facebook"></i></a>
        <a href="https://youtube.com/@saimnews" target="_blank"><i class="fab fa-youtube"></i></a>
        <a href="https://instagram.com/saimnews" target="_blank"><i class="fab fa-instagram"></i></a>
    </div>
    <p class="copyright">&copy; 2026 SAIM NEWS | AI FUTURE JOURNALISM</p>
    
    <div class="admin-entry" ondblclick="triggerAdmin()">
        <i class="fas fa-shield-alt"></i> SECURE TERMINAL (DBL CLICK)
    </div>
</footer>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
    // আপনার ফায়ারবেস কনফিগারেশন (বজায় রাখা হয়েছে)
    const firebaseConfig = {
        apiKey: "BORAzOk9gfuDcIllmqyirg6PtxjLXczeJYSurRw1kCHoE2gEnEN37bhEK19QKkPMM3VKriqBFqBYBb2bdeO4gxE",
        authDomain: "news-70912.firebaseapp.com",
        projectId: "news-70912",
        storageBucket: "news-70912.appspot.com",
        messagingSenderId: "1087091279604",
        appId: "1:1087091279604:web:866e4a32c64b5f12"
    };

    // ফায়ারবেস শুরু করা
    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.firestore();
    let allNews = [];

    // ডাটাবেস থেকে রিয়েলটাইম নিউজ সংগ্রহ
    function connectStream() {
        console.log("Firestore-এর সাথে সংযোগ স্থাপন করা হচ্ছে...");
        
        // 'saimNews' কালেকশন থেকে সময় অনুযায়ী (Timestamp) নিউজ আনা হচ্ছে
        db.collection("saimNews").orderBy("timestamp", "desc").onSnapshot((snapshot) => {
            allNews = [];
            snapshot.forEach(doc => {
                allNews.push({ id: doc.id, ...doc.data() });
            });
            
            console.log("রিয়েলটাইম আপডেট: " + allNews.length + " টি খবর পাওয়া গেছে।");
            renderNews(allNews);
        }, (error) => {
            console.error("Connection Error:", error);
            // স্ক্রিনে এরর দেখানোর জন্য
            const feed = document.getElementById('netflix-feed');
            if(feed) feed.innerHTML = `<p style='color:red;'>সার্ভার এরর: ${error.message}</p>`;
        });
    }

    // নিউজগুলো ওয়েবসাইটে দেখানোর ফাংশন
    function renderNews(dataList) {
        const feed = document.getElementById('netflix-feed');
        if (!feed) return;

        if (dataList.length === 0) {
            feed.innerHTML = "<p style='color:#666;'>এখনো কোনো সংবাদ আপলোড করা হয়নি।</p>";
            return;
        }

        let html = "";
        dataList.forEach((data) => {
            // ভিডিও থাকলে ইউটিউব থাম্বনেইল, না থাকলে ছবির লিঙ্ক ব্যবহার হবে
            const thumb = data.videoId ? `https://img.youtube.com/vi/${data.videoId}/mqdefault.jpg` : (data.image || 'https://via.placeholder.com/300x170');
            
            html += `
                <div class="netflix-card" onclick="openVortex('${data.id}')">
                    <img src="${thumb}" alt="News">
                    <div class="card-info">
                        <small style="color:red; font-weight:bold; text-transform:uppercase;">${data.category || 'সাধারণ'}</small>
                        <h4 style="color:white; font-size:0.95rem; margin-top:5px; font-weight:600;">${data.title || 'শিরোনামহীন'}</h4>
                    </div>
                </div>
            `;
        });
        feed.innerHTML = html;
    }

    // সার্চ ফাংশন
    function searchNews() {
        const term = document.getElementById('searchInput').value.toLowerCase();
        const filtered = allNews.filter(n => 
            (n.title && n.title.toLowerCase().includes(term)) || 
            (n.category && n.category.toLowerCase().includes(term))
        );
        document.getElementById('rowTitle').innerText = term ? `ফলাফল: ${term.toUpperCase()}` : "TRENDING NOW";
        renderNews(filtered);
    }

    // নিউজের বিস্তারিত পপ-আপ (Vortex) খোলার ফাংশন
    function openVortex(id) {
        const n = allNews.find(item => item.id === id);
        if (!n) return;

        const display = document.getElementById('vortex-data');
        
        let media = n.videoId ? `
            <div style="position:relative; padding-bottom:56.25%; height:0; border-radius:15px; overflow:hidden; margin:25px 0; border:1px solid #333; box-shadow: 0 0 30px rgba(255,0,0,0.1);">
                <iframe src="https://www.youtube.com/embed/${n.videoId}?autoplay=1" style="position:absolute; inset:0; width:100%; height:100%; border:none;" allowfullscreen></iframe>
            </div>
        ` : `<img src="${n.image || ''}" style="width:100%; border-radius:15px; margin:25px 0; border:1px solid #333;">`;

        display.innerHTML = `
            <h1 style="font-size:2.2rem; color:#fff; line-height:1.3; margin-bottom:15px;">${n.title || ''}</h1>
            <div style="display:flex; gap:15px; align-items:center; margin-bottom:20px;">
                <span style="background:red; color:white; padding:2px 12px; border-radius:4px; font-size:0.8rem; font-weight:bold;">${n.category || ''}</span>
                <span style="color:#666; font-size:0.9rem;"><i class="far fa-calendar-alt"></i> ${n.date || ''}</span>
            </div>
            ${media}
            <div style="font-size:1.15rem; line-height:1.8; color:#bbb; white-space:pre-wrap; text-align:justify; font-weight:300;">${n.desc || ''}</div>
        `;
        document.getElementById('newsVortex').style.display = "block";
        document.body.style.overflow = "hidden";
    }

    function closeVortex() {
        document.getElementById('newsVortex').style.display = "none";
        document.body.style.overflow = "auto";
    }

    // অ্যাডমিন প্যানেলে যাওয়ার গোপন কোড
    function triggerAdmin() {
        const pass = prompt("অ্যাডমিন এক্সেস কোড দিন:");
        if(pass === "Sa@im3457") {
            sessionStorage.setItem("saim_admin", "active");
            window.location.href = "admin.html";
        } else if(pass != null) {
            alert("ভুল কোড! প্রবেশাধিকার সংরক্ষিত।");
        }
    }

    // পেজ লোড হওয়ার পর কানেকশন শুরু
    window.onload = connectStream;
</script>


</body>
</html>
