<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaimNews | AI Driven Future Journalism</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;600;700&family=Orbitron:wght@400;900&family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --primary: #ff0000;
            --secondary: #00f2ff;
            --dark-core: #050506;
            --glass: rgba(255, 255, 255, 0.05);
            --text: #e0e0e0;
            --neon-glow: 0 0 15px var(--primary);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        
        body { 
            background: var(--dark-core); 
            color: var(--text); 
            font-family: 'Inter', 'Hind Siliguri', sans-serif;
            overflow-x: hidden;
        }

        /* ২০৫০ থিম কাস্টমাইজার */
        .theme-panel {
            position: fixed; left: -200px; top: 20%; background: var(--glass);
            backdrop-filter: blur(15px); padding: 20px; border-radius: 0 20px 20px 0;
            z-index: 9999; border: 1px solid rgba(255,255,255,0.1);
        }
        .theme-panel.active { left: 0; }
        .theme-toggle {
            position: absolute; right: -40px; top: 0; background: var(--primary);
            width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;
            border-radius: 0 10px 10px 0; cursor: pointer; color: white;
        }

        /* Language Hub */
        .lang-hub { display: flex; gap: 10px; align-items: center; }
        .lang-btn { 
            background: var(--glass); border: 1px solid rgba(255,255,255,0.1);
            color: white; padding: 5px 12px; border-radius: 50px; cursor: pointer; font-size: 0.8rem;
        }
        .lang-btn.active { background: var(--primary); border-color: var(--primary); }

        /* Navigation Ultra */
        header { 
            background: rgba(5, 5, 6, 0.8); backdrop-filter: blur(30px);
            border-bottom: 1px solid rgba(255,255,255,0.05); position: sticky; top: 0; z-index: 1000;
        }
        .nav-container { 
            max-width: 1500px; margin: 0 auto; padding: 15px 40px; 
            display: flex; justify-content: space-between; align-items: center; 
        }
        .logo { 
            font-family: 'Orbitron', sans-serif; font-size: 1.8rem; font-weight: 900; 
            color: white; text-decoration: none; letter-spacing: 2px;
        }
        .logo span { color: var(--primary); text-shadow: var(--neon-glow); }

        /* Main AI Grid */
        .ai-grid { 
            max-width: 1500px; margin: 30px auto; padding: 0 40px; 
            display: grid; grid-template-columns: 1fr 400px; gap: 40px; 
        }

        /* Hero Vision Card */
        .vision-card {
            position: relative; height: 600px; border-radius: 40px; overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1); cursor: pointer;
            box-shadow: 0 50px 100px rgba(0,0,0,0.8);
        }
        .vision-card img { width: 100%; height: 100%; object-fit: cover; }
        .vision-content {
            position: absolute; inset: 0; background: linear-gradient(0deg, #050506 10%, transparent 70%);
            display: flex; flex-direction: column; justify-content: flex-end; padding: 60px;
        }

        /* Feed System */
        .news-stream { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 30px; margin-top: 50px; }
        .stream-card {
            background: var(--glass); border-radius: 30px; overflow: hidden;
            border: 1px solid rgba(255,255,255,0.03); cursor: pointer;
        }
        .stream-card:hover { transform: translateY(-15px) scale(1.02); border-color: var(--secondary); box-shadow: 0 20px 40px rgba(0,242,255,0.1); }
        .stream-img { width: 100%; height: 220px; object-fit: cover; }
        .stream-info { padding: 25px; }

        /* Sidebar Trending */
        .trending-panel { background: var(--glass); border-radius: 35px; padding: 30px; border: 1px solid rgba(255,255,255,0.05); }
        .trend-item { 
            display: flex; gap: 20px; margin-bottom: 30px; align-items: center; 
            padding: 10px; border-radius: 20px;
        }
        .trend-item:hover { background: rgba(255,255,255,0.02); }
        .trend-item img { width: 100px; height: 70px; border-radius: 15px; object-fit: cover; }

        /* Full News Experience Modal */
        #newsVortex {
            display: none; position: fixed; inset: 0; background: #000; z-index: 9999;
            overflow-y: auto; padding: 50px 20px; animation: vortexIn 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }
        @keyframes vortexIn { from { opacity: 0; clip-path: circle(0%); } to { opacity: 1; clip-path: circle(100%); } }
        .vortex-content { max-width: 1000px; margin: 0 auto; }
        
        /* Language Translate Logic */
        [data-lang="en"] { display: none; }
        
        /* Login Hidden */
        .ghost-login { position: fixed; bottom: 20px; right: 20px; opacity: 0; cursor: default; width: 50px; height: 50px; }
        .ghost-login:hover { opacity: 0.1; }

        @media (max-width: 1100px) { .ai-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body class="theme-red">

<div class="theme-panel" id="themePanel">
    <div class="theme-toggle" onclick="document.getElementById('themePanel').classList.toggle('active')">
        <i class="fas fa-palette"></i>
    </div>
    <h4 style="margin-bottom:15px; font-size:0.8rem; text-transform:uppercase; letter-spacing:1px;">Core Color</h4>
    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
        <button onclick="changeColor('#ff0000')" style="background:#ff0000; height:30px; border-radius:5px; border:none;"></button>
        <button onclick="changeColor('#00f2ff')" style="background:#00f2ff; height:30px; border-radius:5px; border:none;"></button>
        <button onclick="changeColor('#7000ff')" style="background:#7000ff; height:30px; border-radius:5px; border:none;"></button>
        <button onclick="changeColor('#00ff40')" style="background:#00ff40; height:30px; border-radius:5px; border:none;"></button>
    </div>
</div>

<header>
    <div class="nav-container">
        <a href="index.html" class="logo">SAIM<span>NEWS</span></a>
        
        <div class="lang-hub">
            <button class="lang-btn active" onclick="setLang('bn')">বাংলা</button>
            <button class="lang-btn" onclick="setLang('en')">English</button>
        </div>

        <div style="font-size: 1.2rem; cursor: pointer;" onclick="openSearch()">
            <i class="fas fa-search"></i>
        </div>
    </div>
</header>

<div class="ai-grid">
    <main>
        <div id="hero-vortex"></div>
        
        <div class="news-stream" id="main-stream"></div>
    </main>

    <aside>
        <div class="trending-panel">
            <h3 style="margin-bottom:25px; font-family:'Orbitron';">SIGNAL LATEST</h3>
            <div id="side-stream"></div>
        </div>
    </aside>
</div>

<div id="newsVortex">
    <div class="vortex-content">
        <button onclick="closeVortex()" style="background:none; border:none; color:var(--primary); font-size:3rem; cursor:pointer; float:right;">&times;</button>
        <div id="vortex-data"></div>
    </div>
</div>

<div class="ghost-login" ondblclick="triggerAdmin()"></div>

<script>
    // --- (b) Firebase Config (Must Match Admin) ---
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_PROJECT.firebaseapp.com",
        projectId: "YOUR_PROJECT_ID",
        storageBucket: "YOUR_PROJECT.appspot.com",
        messagingSenderId: "YOUR_ID",
        appId: "YOUR_APP_ID"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // ২০৫০ ভাষা পরিবর্তন লজিক (AI Powered Localization Concept)
    function setLang(lang) {
        document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
        // এখানে আপনি ভবিষ্যতে Google Translate API যুক্ত করতে পারেন
        alert(lang === 'bn' ? "সিস্টেম ভাষা বাংলায় পরিবর্তন করা হয়েছে" : "System switched to English");
    }

    // ডাইনামিক কালার পরিবর্তন
    function changeColor(color) {
        document.documentElement.style.setProperty('--primary', color);
        document.documentElement.style.setProperty('--neon-glow', `0 0 15px ${color}`);
    }

    // অ্যাডমিন গেটওয়ে (Double Click on bottom right corner)
    function triggerAdmin() {
        const pass = prompt("Enter Super Admin Code:");
        if(pass === "Sa@im3457") {
            sessionStorage.setItem("saim_admin", "active");
            window.location.href = "admin.html";
        }
    }

    // Real-time Data Sync
    function connectAIStream() {
        db.collection("saimNews").orderBy("timestamp", "desc").onSnapshot((snapshot) => {
            const hero = document.getElementById('hero-vortex');
            const main = document.getElementById('main-stream');
            const side = document.getElementById('side-stream');
            
            let hHtml = ""; let mHtml = ""; let sHtml = "";
            let idx = 0;

            snapshot.forEach((doc) => {
                const data = doc.data();
                const id = doc.id;
                const img = data.videoId ? `https://img.youtube.com/vi/${data.videoId}/maxresdefault.jpg` : data.image;

                if(idx === 0) {
                    hHtml = `
                        <div class="vision-card" onclick="openVortex('${id}')">
                            <img src="${img}">
                            <div class="vision-content">
                                <span style="color:var(--primary); font-weight:900; letter-spacing:3px;">LIVE FEED</span>
                                <h1 style="font-size:3.5rem; margin:15px 0; line-height:1.1;">${data.title}</h1>
                                <p style="font-size:1.2rem; opacity:0.7;">${data.desc.substring(0, 180)}...</p>
                            </div>
                        </div>
                    `;
                } else if(idx < 7) {
                    mHtml += `
                        <div class="stream-card" onclick="openVortex('${id}')">
                            <img src="${img}" class="stream-img">
                            <div class="stream-info">
                                <span style="color:var(--primary); font-size:0.8rem; font-weight:bold;">${data.category}</span>
                                <h3 style="margin-top:10px; line-height:1.4;">${data.title}</h3>
                            </div>
                        </div>
                    `;
                } else {
                    sHtml += `
                        <div class="trend-item" onclick="openVortex('${id}')" style="cursor:pointer">
                            <img src="${img}">
                            <div>
                                <h4 style="font-size:0.9rem;">${data.title}</h4>
                                <small style="color:var(--primary);">${data.date}</small>
                            </div>
                        </div>
                    `;
                }
                idx++;
            });
            hero.innerHTML = hHtml;
            main.innerHTML = mHtml;
            side.innerHTML = sHtml;
        });
    }

    function openVortex(id) {
        db.collection("saimNews").doc(id).get().then((doc) => {
            const n = doc.data();
            const display = document.getElementById('vortex-data');
            
            let media = n.videoId ? `
                <div style="position:relative; padding-bottom:56.25%; height:0; border-radius:30px; overflow:hidden; margin:30px 0; border:1px solid var(--primary);">
                    <iframe src="https://www.youtube.com/embed/${n.videoId}?autoplay=1" style="position:absolute; inset:0; width:100%; height:100%; border:none;" allowfullscreen></iframe>
                </div>
            ` : `<img src="${n.image}" style="width:100%; border-radius:30px; margin:30px 0; border:1px solid rgba(255,255,255,0.1);">`;

            display.innerHTML = `
                <h4 style="color:var(--primary); font-family:'Orbitron'; letter-spacing:5px;">${n.category}</h4>
                <h1 style="font-size:3.5rem; margin:20px 0; color:#fff;">${n.title}</h1>
                <p style="opacity:0.5; margin-bottom:10px;">TIMESTAMP: ${n.date}</p>
                <div style="height:2px; width:100px; background:var(--primary); margin-bottom:30px;"></div>
                ${media}
                <div style="font-size:1.4rem; line-height:1.8; color:#eee; white-space:pre-wrap; text-align:justify;">${n.desc}</div>
            `;
            document.getElementById('newsVortex').style.display = "block";
            document.body.style.overflow = "hidden";
        });
    }

    function closeVortex() {
        document.getElementById('newsVortex').style.display = "none";
        document.body.style.overflow = "auto";
        document.getElementById('vortex-data').innerHTML = "";
    }

    window.onload = connectAIStream;
</script>

</body>
</html>
