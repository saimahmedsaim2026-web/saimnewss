<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaimNews | AI Driven Future Journalism</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;600;700&family=Orbitron:wght@400;900&family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --primary: #ff0000;
            --secondary: #00f2ff;
            --dark-core: #050506;
            --glass: rgba(255, 255, 255, 0.05);
            --text: #e0e0e0;
            --neon-glow: 0 0 15px var(--primary);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        
        body { 
            background: var(--dark-core); 
            color: var(--text); 
            font-family: 'Inter', 'Hind Siliguri', sans-serif;
            overflow-x: hidden;
        }

        /* ২০৫০ থিম কাস্টমাইজার */
        .theme-panel {
            position: fixed; left: -200px; top: 20%; background: var(--glass);
            backdrop-filter: blur(15px); padding: 20px; border-radius: 0 20px 20px 0;
            z-index: 9999; border: 1px solid rgba(255,255,255,0.1);
        }
        .theme-panel.active { left: 0; }
        .theme-toggle {
            position: absolute; right: -40px; top: 0; background: var(--primary);
            width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;
            border-radius: 0 10px 10px 0; cursor: pointer; color: white;
        }

        /* Navigation Ultra */
        header { 
            background: rgba(5, 5, 6, 0.8); backdrop-filter: blur(30px);
            border-bottom: 1px solid rgba(255,255,255,0.05); position: sticky; top: 0; z-index: 1000;
        }
        .nav-container { 
            max-width: 1500px; margin: 0 auto; padding: 15px 40px; 
            display: flex; justify-content: space-between; align-items: center; 
        }
        .logo { 
            font-family: 'Orbitron', sans-serif; font-size: 1.8rem; font-weight: 900; 
            color: white; text-decoration: none; letter-spacing: 2px;
        }
        .logo span { color: var(--primary); text-shadow: var(--neon-glow); }

        /* Netflix Row Style */
        .netflix-container { padding: 40px 0; background: var(--dark-core); }
        .row-title { font-family: 'Orbitron'; color: white; border-left: 4px solid var(--primary); padding-left: 15px; margin-left: 40px; margin-bottom: 20px; }
        .news-row { display: flex; gap: 20px; overflow-x: auto; padding: 20px 40px; scrollbar-width: none; }
        .news-row::-webkit-scrollbar { display: none; }
        
        .netflix-card {
            min-width: 300px; height: 170px; border-radius: 15px; overflow: hidden;
            position: relative; cursor: pointer; transition: 0.4s; border: 1px solid rgba(255,255,255,0.1);
        }
        .netflix-card:hover { transform: scale(1.1); z-index: 10; border-color: var(--primary); box-shadow: 0 0 20px rgba(255,0,0,0.3); }
        .netflix-card img { width: 100%; height: 100%; object-fit: cover; }
        .card-info { position: absolute; inset: 0; background: linear-gradient(transparent, rgba(0,0,0,0.9)); display: flex; flex-direction: column; justify-content: flex-end; padding: 15px; }

        /* AI Grid & Vision Card */
        .ai-grid { max-width: 1500px; margin: 30px auto; padding: 0 40px; display: grid; grid-template-columns: 1fr 400px; gap: 40px; }
        .vision-card { position: relative; height: 500px; border-radius: 40px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; }
        .vision-card img { width: 100%; height: 100%; object-fit: cover; }
        .vision-content { position: absolute; inset: 0; background: linear-gradient(0deg, #050506 10%, transparent 70%); display: flex; flex-direction: column; justify-content: flex-end; padding: 40px; }

        /* Sidebar & Stream */
        .trending-panel { background: var(--glass); border-radius: 35px; padding: 30px; border: 1px solid rgba(255,255,255,0.05); }
        .trend-item { display: flex; gap: 15px; margin-bottom: 20px; align-items: center; cursor: pointer; }
        .trend-item img { width: 80px; height: 60px; border-radius: 12px; object-fit: cover; }

        /* Vortex Modal */
        #newsVortex { display: none; position: fixed; inset: 0; background: #000; z-index: 9999; overflow-y: auto; padding: 50px 20px; }
        .vortex-content { max-width: 1000px; margin: 0 auto; }

        .ghost-login { position: fixed; bottom: 20px; right: 20px; opacity: 0; width: 50px; height: 50px; cursor: pointer; }
    </style>
</head>
<body>

<div class="theme-panel" id="themePanel">
    <div class="theme-toggle" onclick="document.getElementById('themePanel').classList.toggle('active')"><i class="fas fa-palette"></i></div>
    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
        <button onclick="changeColor('#ff0000')" style="background:#ff0000; height:30px; border:none; border-radius:5px;"></button>
        <button onclick="changeColor('#00f2ff')" style="background:#00f2ff; height:30px; border:none; border-radius:5px;"></button>
    </div>
</div>

<header>
    <div class="nav-container">
        <a href="#" class="logo">SAIM<span>NEWS</span></a>
        <div style="font-size: 1.2rem; cursor: pointer;"><i class="fas fa-search"></i></div>
    </div>
</header>

<div class="netflix-container">
    <h2 class="row-title">TRENDING NOW</h2>
    <div class="news-row" id="netflix-feed"></div>
</div>

<div class="ai-grid">
    <main>
        <div id="hero-vortex"></div>
        <div id="main-stream" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 30px; margin-top: 30px;"></div>
    </main>
    <aside>
        <div class="trending-panel">
            <h3 style="margin-bottom:25px; font-family:'Orbitron';">SIGNAL LATEST</h3>
            <div id="side-stream"></div>
        </div>
    </aside>
</div>

<div id="newsVortex">
    <div class="vortex-content">
        <button onclick="closeVortex()" style="background:none; border:none; color:var(--primary); font-size:3rem; cursor:pointer; float:right;">&times;</button>
        <div id="vortex-data"></div>
    </div>
</div>

<div class="ghost-login" ondblclick="triggerAdmin()"></div>

<script>
    // (b) - Firebase Neural Connection (কানেকশন আইডি বসানো হয়েছে)
    const firebaseConfig = {
        apiKey: "BORAzOk9gfuDcIllmqyirg6PtxjLXczeJYSurRw1kCHoE2gEnEN37bhEK19QKkPMM3VKriqBFqBYBb2bdeO4gxE",
        authDomain: "news-70912.firebaseapp.com",
        projectId: "news-70912",
        storageBucket: "news-70912.appspot.com",
        messagingSenderId: "1087091279604",
        appId: "1:1087091279604:web:866e4a32c64b5f12"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function changeColor(color) {
        document.documentElement.style.setProperty('--primary', color);
        document.documentElement.style.setProperty('--neon-glow', `0 0 15px ${color}`);
    }

    function triggerAdmin() {
        const pass = prompt("Enter Super Admin Code:");
        if(pass === "Sa@im3457") window.location.href = "admin.html";
    }

    // ডাটা কানেকশন ও ডিজাইন রেন্ডারিং
    function connectAIStream() {
        db.collection("saimNews").orderBy("timestamp", "desc").onSnapshot((snapshot) => {
            const netflixRow = document.getElementById('netflix-feed');
            const hero = document.getElementById('hero-vortex');
            const main = document.getElementById('main-stream');
            const side = document.getElementById('side-stream');
            
            let nHtml = ""; let hHtml = ""; let mHtml = ""; let sHtml = "";
            let idx = 0;

            snapshot.forEach((doc) => {
                const data = doc.data();
                const id = doc.id;
                const img = data.videoId ? `https://img.youtube.com/vi/${data.videoId}/maxresdefault.jpg` : data.image;

                // ১. Netflix Trending Row (সব নিউজ দেখাবে)
                nHtml += `
                    <div class="netflix-card" onclick="openVortex('${id}')">
                        <img src="${img}">
                        <div class="card-info">
                            <small style="color:var(--primary); font-weight:bold;">${data.category}</small>
                            <h4 style="color:white; font-size:0.9rem;">${data.title}</h4>
                        </div>
                    </div>
                `;

                // ২. Main AI Grid (প্রথমটি হিরো কার্ড, বাকিগুলো গ্রিড)
                if(idx === 0) {
                    hHtml = `
                        <div class="vision-card" onclick="openVortex('${id}')">
                            <img src="${img}">
                            <div class="vision-content">
                                <span style="color:var(--primary); font-weight:900;">FEATURED FEED</span>
                                <h1 style="font-size:2.5rem; margin:10px 0;">${data.title}</h1>
                            </div>
                        </div>
                    `;
                } else if (idx < 5) {
                    mHtml += `
                        <div class="netflix-card" style="height:220px;" onclick="openVortex('${id}')">
                            <img src="${img}">
                            <div class="card-info">
                                <small style="color:var(--primary);">${data.category}</small>
                                <h3>${data.title}</h3>
                            </div>
                        </div>
                    `;
                } else {
                    sHtml += `
                        <div class="trend-item" onclick="openVortex('${id}')">
                            <img src="${img}">
                            <div>
                                <h4 style="font-size:0.8rem;">${data.title}</h4>
                                <small style="color:var(--primary);">${data.date}</small>
                            </div>
                        </div>
                    `;
                }
                idx++;
            });
            netflixRow.innerHTML = nHtml;
            hero.innerHTML = hHtml;
            main.innerHTML = mHtml;
            side.innerHTML = sHtml;
        });
    }

    function openVortex(id) {
        db.collection("saimNews").doc(id).get().then((doc) => {
            const n = doc.data();
            const display = document.getElementById('vortex-data');
            let media = n.videoId ? `<div style="position:relative; padding-bottom:56.25%; height:0; border-radius:25px; overflow:hidden; margin:30px 0; border:1px solid var(--primary);"><iframe src="https://www.youtube.com/embed/${n.videoId}?autoplay=1" style="position:absolute; inset:0; width:100%; height:100%; border:none;" allowfullscreen></iframe></div>` : `<img src="${n.image}" style="width:100%; border-radius:25px; margin:30px 0;">`;
            display.innerHTML = `<h1 style="font-size:3rem; color:#fff;">${n.title}</h1><p style="color:var(--primary);">${n.category} | ${n.date}</p>${media}<div style="font-size:1.2rem; line-height:1.8; color:#ccc; white-space:pre-wrap;">${n.desc}</div>`;
            document.getElementById('newsVortex').style.display = "block";
            document.body.style.overflow = "hidden";
        });
    }

    function closeVortex() {
        document.getElementById('newsVortex').style.display = "none";
        document.body.style.overflow = "auto";
    }

    window.onload = connectAIStream;
</script>
</body>
</html>
